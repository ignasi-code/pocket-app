<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pocket Cloudflare Env Helper</title>
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      background: #f7f7f4;
      color: #161616;
      margin: 0;
      padding: 32px 16px;
    }

    main {
      background: #fff;
      border: 1px solid #deded8;
      border-radius: 8px;
      margin: 0 auto;
      max-width: 760px;
      padding: 24px;
    }

    h1 {
      font-size: 1.35rem;
      margin: 0 0 18px;
    }

    label {
      display: block;
      font-weight: 700;
      margin: 16px 0 8px;
    }

    input,
    textarea {
      border: 1px solid #b9b9b2;
      border-radius: 6px;
      box-sizing: border-box;
      font: inherit;
      padding: 12px;
      width: 100%;
    }

    textarea {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      min-height: 180px;
      resize: vertical;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }

    button {
      background: #0f6fff;
      border: 0;
      border-radius: 6px;
      color: white;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
      padding: 11px 14px;
    }

    button.secondary {
      background: #ecece7;
      color: #161616;
    }

    p {
      color: #555;
      line-height: 1.45;
      margin: 12px 0 0;
    }
  </style>
</head>
<body>
  <main>
    <h1>Pocket Cloudflare Env Helper</h1>

    <label for="token">Cloudflare API token</label>
    <input id="token" type="password" autocomplete="off" spellcheck="false">

    <label for="account">Cloudflare account ID</label>
    <input id="account" type="text" autocomplete="off" spellcheck="false">

    <label for="command">Terminal command</label>
    <textarea id="command" readonly></textarea>

    <div class="actions">
      <button id="copy" type="button">Copy command</button>
      <button class="secondary" id="clear" type="button">Clear</button>
    </div>

    <p>Paste the copied command into Terminal, press Enter, then tell Codex done.</p>
  </main>

  <script>
    const token = document.querySelector("#token");
    const account = document.querySelector("#account");
    const command = document.querySelector("#command");
    const copy = document.querySelector("#copy");
    const clear = document.querySelector("#clear");

    function shellQuote(value) {
      return `'${String(value).trim().replaceAll("'", "'\"'\"'")}'`;
    }

    function updateCommand() {
      const apiToken = token.value.trim();
      const accountId = account.value.trim();
      command.value = [
        "umask 077",
        "cat > /tmp/pocket-cloudflare.env <<'EOF'",
        `export CLOUDFLARE_API_TOKEN=${shellQuote(apiToken)}`,
        `export CLOUDFLARE_ACCOUNT_ID=${shellQuote(accountId)}`,
        "EOF",
      ].join("\n");
    }

    async function copyCommand() {
      command.select();
      await navigator.clipboard.writeText(command.value);
      copy.textContent = "Copied";
      setTimeout(() => {
        copy.textContent = "Copy command";
      }, 1200);
    }

    function clearAll() {
      token.value = "";
      account.value = "";
      updateCommand();
      token.focus();
    }

    token.addEventListener("input", updateCommand);
    account.addEventListener("input", updateCommand);
    copy.addEventListener("click", copyCommand);
    clear.addEventListener("click", clearAll);
    updateCommand();
  </script>
</body>
</html>
