{% if cart_upsells %}
  <div class="cart-drawer__upsell slick-slider" aria-label="A few more ideas">
    <div class="title">
      <span>A few more ideas...</span>
      <span class="cart-drawer__upsell-nav" aria-hidden="true">
        <span class="swiper-upsell-prev">←</span>
        <span class="swiper-upsell-next">→</span>
      </span>
    </div>
    <div class="cart-drawer__upsell-track">
      {% for product in cart_upsells %}
        {% set variant = first_variant(product) %}
        <div class="cart-drawer__upsell-slide">
          <a href="/store/products/{{ product.handle }}">
            {% set upsell_image = product_image(product) %}
            <img data-cart-deferred-image data-src="{{ image_url(upsell_image, 240) }}" data-srcset="{{ image_srcset(upsell_image, [120, 180, 240]) }}" sizes="120px" alt="{{ product.title }}" loading="lazy" decoding="async" width="120" height="144">
            <div class="name">{{ product.title }}</div>
            <div class="price">{{ price_label(product) }}</div>
          </a>
          <button class="button button--blue" type="button" data-store-add data-handle="{{ product.handle }}" data-variant-id="{{ variant.id }}">Add to Bag</button>
        </div>
      {% endfor %}
    </div>
  </div>
{% endif %}
