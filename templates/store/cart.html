{% extends "store/base.html" %}
{% block title %}Bag - Pocket Store{% endblock %}
{% block body %}
  <main class="cart" data-view="cart" data-cart-page data-checkout-endpoint="/store/api/checkout">
    <section class="cart-page js-cartPageSection">
      <div class="cart-page__items" data-cart-lines style="min-height: 497px"></div>

      <aside class="cart-page__summary cart-page__totals">
        <div class="cart-page__totals__wrap">
          <p class="cart-page__summary-title cart-page__totals__head">order summary</p>
          <div class="cart-page__totals__list">
            <div class="cart-page__total">
              <span>order value</span>
              <strong data-cart-subtotal>$0.00</strong>
            </div>
            <div class="cart-page__total cart-page__total--grand">
              <span>total</span>
              <strong data-cart-total>$0.00</strong>
            </div>
          </div>
          <a class="cart-page__checkout" href="/checkout" data-checkout>Checkout</a>
          <p class="cart-page__shipping cart-page__shipping-info">Enjoy complimentary ground shipping on US orders $250+</p>
          <div class="notice" data-checkout-output></div>
        </div>
      </aside>
    </section>

    <div data-cart-page-upsell-fragment data-fragment-url="/store/cart-upsells-fragment"></div>
  </main>
{% endblock %}
