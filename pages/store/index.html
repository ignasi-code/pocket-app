<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pocket Store</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f3ef;
      --surface: #ffffff;
      --surface-soft: #fdfaf5;
      --text: #171412;
      --muted: #69615a;
      --line: #ddd4cb;
      --accent: #236b51;
      --accent-strong: #124634;
      --danger: #9d2b2b;
      --shadow: 0 14px 34px rgba(35, 29, 22, 0.09);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    button, select {
      font: inherit;
    }

    button {
      border: 0;
      background: var(--text);
      color: #fff;
      border-radius: 6px;
      min-height: 40px;
      padding: 0 14px;
      cursor: pointer;
      font-weight: 700;
    }

    button:hover { background: #2c2621; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    a { color: var(--accent-strong); }

    .shell {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 44px;
    }

    .topbar {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      padding-bottom: 22px;
      border-bottom: 1px solid var(--line);
    }

    .title-block h1 {
      margin: 0 0 7px;
      font-size: clamp(30px, 5vw, 58px);
      line-height: 0.95;
      letter-spacing: 0;
    }

    .title-block p {
      margin: 0;
      color: var(--muted);
      max-width: 680px;
      line-height: 1.5;
    }

    .status-pill {
      flex: 0 0 auto;
      border: 1px solid var(--line);
      background: var(--surface-soft);
      border-radius: 999px;
      padding: 9px 13px;
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      gap: 24px;
      align-items: start;
      padding-top: 24px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 16px;
    }

    .product-card,
    .cart-panel,
    .checkout-panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .product-card {
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .product-image {
      width: 100%;
      aspect-ratio: 4 / 5;
      background: #ebe5de;
      object-fit: cover;
      display: block;
    }

    .product-body {
      padding: 13px;
      display: grid;
      gap: 11px;
      align-content: start;
    }

    .product-title {
      margin: 0;
      font-size: 16px;
      line-height: 1.25;
    }

    .price {
      color: var(--muted);
      font-weight: 700;
      font-size: 14px;
    }

    .variant-select {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      padding: 0 10px;
    }

    .cart-stack {
      position: sticky;
      top: 18px;
      display: grid;
      gap: 12px;
    }

    .cart-panel,
    .checkout-panel {
      padding: 16px;
    }

    .panel-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .panel-heading h2 {
      margin: 0;
      font-size: 19px;
    }

    .mini {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .cart-lines {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .cart-line {
      display: grid;
      grid-template-columns: 52px 1fr;
      gap: 10px;
      padding: 10px 0;
      border-top: 1px solid var(--line);
    }

    .cart-thumb {
      width: 52px;
      height: 64px;
      object-fit: cover;
      border-radius: 6px;
      background: #ebe5de;
    }

    .line-title {
      margin: 0 0 4px;
      line-height: 1.25;
      font-size: 14px;
      font-weight: 750;
    }

    .line-meta {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .qty-row {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-top: 9px;
    }

    .qty-button {
      width: 30px;
      min-height: 30px;
      padding: 0;
      border-radius: 6px;
      background: #eee7df;
      color: var(--text);
    }

    .remove-button {
      background: transparent;
      color: var(--danger);
      padding: 0 2px;
      min-height: auto;
      font-size: 13px;
      font-weight: 750;
    }

    .cart-total {
      border-top: 1px solid var(--line);
      margin-top: 14px;
      padding-top: 14px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-weight: 800;
    }

    .checkout-button {
      width: 100%;
      margin-top: 14px;
      background: var(--accent);
    }

    .checkout-button:hover { background: var(--accent-strong); }

    .empty,
    .checkout-output {
      color: var(--muted);
      line-height: 1.45;
      font-size: 14px;
    }

    .checkout-output strong {
      color: var(--text);
    }

    .error {
      color: var(--danger);
    }

    @media (max-width: 860px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .cart-stack {
        position: static;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="title-block">
        <h1>Pocket Store</h1>
        <p>Static storefront prototype powered by a Shopify catalog snapshot. Cart state stays local until the mocked Flask checkout verifies it.</p>
      </div>
      <div class="status-pill" id="catalog-status">Loading catalog</div>
    </header>

    <section class="layout">
      <div class="grid" id="products"></div>

      <aside class="cart-stack" aria-label="Cart">
        <section class="cart-panel">
          <div class="panel-heading">
            <h2>Cart</h2>
            <span class="mini" id="cart-count">0 items</span>
          </div>
          <ul class="cart-lines" id="cart-lines"></ul>
          <div class="cart-total">
            <span>Subtotal</span>
            <span id="cart-subtotal">$0.00</span>
          </div>
          <button class="checkout-button" id="checkout-button" type="button">Mock checkout</button>
        </section>

        <section class="checkout-panel">
          <div class="panel-heading">
            <h2>Checkout</h2>
            <span class="mini">Flask mock</span>
          </div>
          <div class="checkout-output" id="checkout-output">Add products, then run a mocked checkout verification.</div>
        </section>
      </aside>
    </section>
  </main>

  <script>
    const CART_KEY = "pocket_store_cart";
    const money = new Intl.NumberFormat("en-US", { style: "currency", currency: "USD" });

    let products = [];
    let productById = new Map();
    let variantById = new Map();
    let cart = loadCart();

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function priceNumber(price) {
      const parsed = Number.parseFloat(String(price || "0").replace(",", ""));
      return Number.isFinite(parsed) ? parsed : 0;
    }

    function formatPrice(price) {
      return money.format(priceNumber(price));
    }

    function loadCart() {
      try {
        const parsed = JSON.parse(localStorage.getItem(CART_KEY) || "[]");
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function saveCart() {
      localStorage.setItem(CART_KEY, JSON.stringify(cart));
    }

    function primaryImage(product, variant) {
      return variant?.featured_image?.src || product?.images?.[0]?.src || "";
    }

    function availableVariants(product) {
      return (product.variants || []).filter(variant => variant.available !== false);
    }

    function buildIndexes() {
      productById = new Map(products.map(product => [String(product.id), product]));
      variantById = new Map();
      for (const product of products) {
        for (const variant of product.variants || []) {
          variantById.set(String(variant.id), { product, variant });
        }
      }
    }

    function renderProducts() {
      const container = document.getElementById("products");
      container.innerHTML = products.map(product => {
        const variants = availableVariants(product);
        if (!variants.length) return "";
        const firstVariant = variants[0];
        const options = variants.map(variant => `
          <option value="${variant.id}">
            ${escapeHtml(variant.title || "Default")} - ${formatPrice(variant.price)}
          </option>
        `).join("");
        return `
          <article class="product-card">
            <img class="product-image" src="${escapeHtml(primaryImage(product, firstVariant))}" alt="${escapeHtml(product.title)}" loading="lazy">
            <div class="product-body">
              <h3 class="product-title">${escapeHtml(product.title)}</h3>
              <div class="price">${formatPrice(firstVariant.price)}</div>
              <select class="variant-select" id="variant-${product.id}" aria-label="Variant for ${escapeHtml(product.title)}">
                ${options}
              </select>
              <button type="button" data-action="add" data-product-id="${product.id}">Add to cart</button>
            </div>
          </article>
        `;
      }).join("");
    }

    function cartSubtotal() {
      return cart.reduce((total, item) => {
        const meta = variantById.get(String(item.id));
        return total + (meta ? priceNumber(meta.variant.price) * item.qty : 0);
      }, 0);
    }

    function renderCart() {
      cart = cart.filter(item => variantById.has(String(item.id)) && item.qty > 0);
      saveCart();

      const lines = document.getElementById("cart-lines");
      const count = cart.reduce((total, item) => total + item.qty, 0);
      document.getElementById("cart-count").textContent = `${count} ${count === 1 ? "item" : "items"}`;
      document.getElementById("cart-subtotal").textContent = money.format(cartSubtotal());
      document.getElementById("checkout-button").disabled = cart.length === 0;

      if (!cart.length) {
        lines.innerHTML = `<li class="empty">Cart empty.</li>`;
        return;
      }

      lines.innerHTML = cart.map(item => {
        const meta = variantById.get(String(item.id));
        const image = primaryImage(meta.product, meta.variant);
        return `
          <li class="cart-line">
            <img class="cart-thumb" src="${escapeHtml(image)}" alt="${escapeHtml(meta.product.title)}" loading="lazy">
            <div>
              <p class="line-title">${escapeHtml(meta.product.title)}</p>
              <div class="line-meta">${escapeHtml(meta.variant.title || "Default")} · ${formatPrice(meta.variant.price)}</div>
              <div class="qty-row">
                <button class="qty-button" type="button" data-action="decrease" data-id="${item.id}" aria-label="Decrease quantity">-</button>
                <strong>${item.qty}</strong>
                <button class="qty-button" type="button" data-action="increase" data-id="${item.id}" aria-label="Increase quantity">+</button>
                <button class="remove-button" type="button" data-action="remove" data-id="${item.id}">Remove</button>
              </div>
            </div>
          </li>
        `;
      }).join("");
    }

    function addVariant(variantId) {
      const id = Number(variantId);
      const existing = cart.find(item => item.id === id);
      if (existing) {
        existing.qty += 1;
      } else {
        cart.push({ id, qty: 1 });
      }
      saveCart();
      renderCart();
    }

    function updateQuantity(variantId, delta) {
      const id = Number(variantId);
      const existing = cart.find(item => item.id === id);
      if (!existing) return;
      existing.qty += delta;
      if (existing.qty <= 0) {
        cart = cart.filter(item => item.id !== id);
      }
      saveCart();
      renderCart();
    }

    function removeVariant(variantId) {
      const id = Number(variantId);
      cart = cart.filter(item => item.id !== id);
      saveCart();
      renderCart();
    }

    async function checkout() {
      const output = document.getElementById("checkout-output");
      output.textContent = "Verifying cart against catalog...";

      try {
        const response = await fetch("/store/api/checkout", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ cartItems: cart })
        });
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error || "Checkout failed.");
        }

        output.innerHTML = `
          <p><strong>Mock checkout verified.</strong></p>
          <p>${data.item_count} ${data.item_count === 1 ? "item" : "items"} · ${money.format(data.subtotal_cents / 100)}</p>
          <p><a href="${escapeHtml(data.shopify_cart_url)}" target="_blank" rel="noopener">Preview Shopify cart permalink</a></p>
        `;
      } catch (error) {
        output.innerHTML = `<span class="error">${escapeHtml(error.message)}</span>`;
      }
    }

    document.addEventListener("click", event => {
      const button = event.target.closest("button[data-action]");
      if (!button) return;
      const action = button.dataset.action;

      if (action === "add") {
        const select = document.getElementById(`variant-${button.dataset.productId}`);
        if (select) addVariant(select.value);
      }
      if (action === "increase") updateQuantity(button.dataset.id, 1);
      if (action === "decrease") updateQuantity(button.dataset.id, -1);
      if (action === "remove") removeVariant(button.dataset.id);
    });

    document.getElementById("checkout-button").addEventListener("click", checkout);

    async function init() {
      const status = document.getElementById("catalog-status");
      try {
        const response = await fetch("/store/catalog.json");
        const data = await response.json();
        products = Array.isArray(data.products) ? data.products : [];
        buildIndexes();
        renderProducts();
        renderCart();
        status.textContent = `${products.length} products loaded`;
      } catch (error) {
        status.textContent = "Catalog failed";
        document.getElementById("products").innerHTML = `<div class="checkout-panel error">${escapeHtml(error.message)}</div>`;
      }
    }

    init();
  </script>
</body>
</html>
