<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pocket Fast</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8f4;
      --ink: #101214;
      --muted: #6a7177;
      --line: #d9ddd5;
      --panel: #ffffff;
      --green: #12a36d;
      --blue: #326bca;
      --orange: #d95d2a;
      --shadow: rgba(16, 18, 20, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 50% 0%, rgba(18, 163, 109, 0.16), transparent 32rem),
        var(--bg);
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button,
    input {
      font: inherit;
    }

    .shell {
      width: min(880px, calc(100vw - 32px));
      min-height: 100vh;
      margin: 0 auto;
      padding: 28px 0 34px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 20px;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      font-size: 18px;
      line-height: 1;
    }

    .mark {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: inset 0 0 0 7px rgba(255, 255, 255, 0.62);
    }

    .route {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.3;
      text-align: right;
    }

    .meter {
      display: grid;
      place-items: center;
      align-content: center;
      gap: 14px;
      text-align: center;
      padding: 20px 0;
    }

    .status {
      min-height: 22px;
      color: var(--green);
      font-size: 15px;
      font-weight: 700;
      line-height: 1.4;
    }

    .speed {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 14px;
      min-height: 144px;
    }

    .speed-value {
      font-size: clamp(74px, 18vw, 168px);
      font-weight: 760;
      line-height: 0.9;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0;
    }

    .speed-unit {
      color: var(--muted);
      font-size: clamp(22px, 4vw, 34px);
      font-weight: 700;
      line-height: 1;
    }

    .direction {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.45;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: end;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.76);
      box-shadow: 0 18px 50px var(--shadow);
      padding: 16px;
    }

    .control-stack {
      display: grid;
      gap: 12px;
    }

    .modes {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
      padding: 5px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #eef1eb;
    }

    .mode {
      min-height: 40px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      font-weight: 760;
      cursor: pointer;
    }

    .mode.active {
      background: var(--panel);
      color: var(--ink);
      box-shadow: 0 8px 24px rgba(16, 18, 20, 0.08);
    }

    .token {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      line-height: 1.2;
    }

    .token input {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--ink);
      padding: 0 12px;
      outline: 0;
    }

    .start {
      min-width: 128px;
      min-height: 88px;
      border: 0;
      border-radius: 8px;
      background: var(--green);
      color: #ffffff;
      font-size: 18px;
      font-weight: 820;
      cursor: pointer;
      box-shadow: 0 18px 34px rgba(18, 163, 109, 0.26);
    }

    .start:disabled {
      cursor: wait;
      opacity: 0.72;
    }

    .results {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .result {
      min-height: 114px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 16px;
      display: grid;
      align-content: space-between;
      gap: 14px;
    }

    .result h2 {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      line-height: 1.25;
      text-transform: uppercase;
    }

    .result strong {
      display: block;
      font-size: 34px;
      line-height: 1;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .result small {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .accent-download {
      border-top: 4px solid var(--orange);
    }

    .accent-upload {
      border-top: 4px solid var(--blue);
    }

    .message {
      min-height: 21px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
      text-align: center;
    }

    @media (max-width: 680px) {
      .shell {
        width: min(100vw - 22px, 560px);
        padding: 18px 0 24px;
      }

      .top {
        align-items: flex-start;
      }

      .speed {
        min-height: 118px;
        gap: 8px;
      }

      .controls,
      .results {
        grid-template-columns: 1fr;
      }

      .start {
        min-height: 54px;
        width: 100%;
      }

      .modes {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="top">
      <div class="brand">
        <span class="mark" aria-hidden="true"></span>
        <span>Pocket Fast</span>
      </div>
      <div class="route">/fast<br>Termux tunnel</div>
    </header>

    <section class="meter" aria-live="polite">
      <div class="status" id="status">Ready</div>
      <div class="speed">
        <span class="speed-value" id="speed">0</span>
        <span class="speed-unit">Mbps</span>
      </div>
      <div class="direction" id="direction">Run both directions</div>
    </section>

    <section class="controls">
      <div class="control-stack">
        <div class="modes" role="tablist" aria-label="Test mode">
          <button class="mode active" type="button" data-mode="both">Both</button>
          <button class="mode" type="button" data-mode="download">Termux upload</button>
          <button class="mode" type="button" data-mode="upload">Termux download</button>
        </div>
        <label class="token">
          Pocket token
          <input id="token" type="password" autocomplete="current-password" placeholder="Only needed if protected">
        </label>
      </div>
      <button class="start" id="start" type="button">Start</button>
    </section>

    <section class="results" aria-label="Speed results">
      <article class="result accent-download">
        <h2>Termux upload</h2>
        <div>
          <strong id="download-result">--</strong>
          <small>server -> browser</small>
        </div>
      </article>
      <article class="result accent-upload">
        <h2>Termux download</h2>
        <div>
          <strong id="upload-result">--</strong>
          <small>browser -> server</small>
        </div>
      </article>
    </section>

    <div class="message" id="message"></div>
  </main>

  <script>
    const DOWNLOAD_BYTES = 16 * 1024 * 1024;
    const UPLOAD_BYTES = 8 * 1024 * 1024;
    const statusEl = document.getElementById("status");
    const speedEl = document.getElementById("speed");
    const directionEl = document.getElementById("direction");
    const messageEl = document.getElementById("message");
    const startButton = document.getElementById("start");
    const tokenInput = document.getElementById("token");
    const downloadResult = document.getElementById("download-result");
    const uploadResult = document.getElementById("upload-result");
    const modeButtons = [...document.querySelectorAll(".mode")];
    let selectedMode = "both";
    let running = false;

    tokenInput.value = sessionStorage.getItem("pocket-fast-token") || "";
    tokenInput.addEventListener("input", () => {
      sessionStorage.setItem("pocket-fast-token", tokenInput.value.trim());
    });

    modeButtons.forEach((button) => {
      button.addEventListener("click", () => {
        selectedMode = button.dataset.mode;
        modeButtons.forEach((item) => item.classList.toggle("active", item === button));
        setDirectionForMode();
      });
    });

    startButton.addEventListener("click", runSelectedTest);

    function authHeaders() {
      const token = tokenInput.value.trim();
      return token ? { "X-Pocket-Token": token } : {};
    }

    function cacheBust() {
      if (crypto.randomUUID) {
        return crypto.randomUUID();
      }
      return `${Date.now()}-${Math.random()}`;
    }

    function mbps(bytes, seconds) {
      return (bytes * 8) / seconds / 1000000;
    }

    function formatSpeed(value) {
      if (!Number.isFinite(value) || value <= 0) {
        return "0";
      }
      if (value >= 100) {
        return value.toFixed(0);
      }
      if (value >= 10) {
        return value.toFixed(1);
      }
      return value.toFixed(2);
    }

    function setSpeed(value) {
      speedEl.textContent = formatSpeed(value);
    }

    function setDirectionForMode() {
      if (selectedMode === "download") {
        directionEl.textContent = "Termux upload: server -> browser";
      } else if (selectedMode === "upload") {
        directionEl.textContent = "Termux download: browser -> server";
      } else {
        directionEl.textContent = "Run both directions";
      }
    }

    function makeUploadPayload(totalBytes) {
      const chunks = [];
      let remaining = totalBytes;
      let offset = 0;
      while (remaining > 0) {
        const size = Math.min(remaining, 1024 * 1024);
        const chunk = new Uint8Array(size);
        for (let index = 0; index < size; index += 1) {
          chunk[index] = (index + offset) % 251;
        }
        chunks.push(chunk);
        remaining -= size;
        offset += size;
      }
      return new Blob(chunks, { type: "application/octet-stream" });
    }

    async function ensureOk(response) {
      if (response.ok) {
        return;
      }

      let detail = "";
      try {
        const data = await response.json();
        detail = data.error || "";
      } catch (_error) {
        detail = response.statusText || "";
      }

      if (response.status === 401) {
        throw new Error("Pocket token required or invalid.");
      }
      throw new Error(detail || `Request failed with status ${response.status}.`);
    }

    async function runDownloadTest() {
      statusEl.textContent = "Testing Termux upload";
      directionEl.textContent = "server -> browser";
      messageEl.textContent = "";
      const url = `/fast/api/download?bytes=${DOWNLOAD_BYTES}&n=${cacheBust()}`;
      const response = await fetch(url, { headers: authHeaders() });
      await ensureOk(response);

      const started = performance.now();
      let received = 0;
      let lastPaint = started;

      if (response.body && response.body.getReader) {
        const reader = response.body.getReader();
        while (true) {
          const result = await reader.read();
          if (result.done) {
            break;
          }
          received += result.value.byteLength;
          const now = performance.now();
          const elapsed = (now - started) / 1000;
          if (elapsed > 0.1 && now - lastPaint > 150) {
            setSpeed(mbps(received, elapsed));
            lastPaint = now;
          }
        }
      } else {
        const buffer = await response.arrayBuffer();
        received = buffer.byteLength;
      }

      const seconds = Math.max((performance.now() - started) / 1000, 0.001);
      const speed = mbps(received, seconds);
      setSpeed(speed);
      downloadResult.textContent = `${formatSpeed(speed)} Mbps`;
      return speed;
    }

    async function runUploadTest() {
      statusEl.textContent = "Testing Termux download";
      directionEl.textContent = "browser -> server";
      messageEl.textContent = "";
      const payload = makeUploadPayload(UPLOAD_BYTES);
      const started = performance.now();
      const response = await fetch(`/fast/api/upload?n=${cacheBust()}`, {
        method: "POST",
        headers: authHeaders(),
        body: payload
      });
      await ensureOk(response);
      const data = await response.json();
      const seconds = Math.max((performance.now() - started) / 1000, 0.001);
      const speed = mbps(data.bytes || UPLOAD_BYTES, seconds);
      setSpeed(speed);
      uploadResult.textContent = `${formatSpeed(speed)} Mbps`;
      return speed;
    }

    async function runSelectedTest() {
      if (running) {
        return;
      }

      running = true;
      startButton.disabled = true;
      startButton.textContent = "Testing";
      statusEl.textContent = "Starting";
      setSpeed(0);
      messageEl.textContent = "";

      if (selectedMode !== "upload") {
        downloadResult.textContent = "--";
      }
      if (selectedMode !== "download") {
        uploadResult.textContent = "--";
      }

      try {
        if (selectedMode === "download" || selectedMode === "both") {
          await runDownloadTest();
        }
        if (selectedMode === "both") {
          await new Promise((resolve) => setTimeout(resolve, 350));
        }
        if (selectedMode === "upload" || selectedMode === "both") {
          await runUploadTest();
        }
        statusEl.textContent = "Complete";
        messageEl.textContent = "Measured through this Flask server and any active tunnel.";
      } catch (error) {
        statusEl.textContent = "Error";
        messageEl.textContent = error.message;
      } finally {
        running = false;
        startButton.disabled = false;
        startButton.textContent = "Again";
        setDirectionForMode();
      }
    }

    setDirectionForMode();
  </script>
</body>
</html>
