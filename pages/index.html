<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Pocket Arkanoid</title>
  <meta name="description" content="A tiny HTML5 Arkanoid arcade game for Pocket Server.">
  <style>
    :root {
      color-scheme: dark;
      --bg: #030306;
      --panel: #111117;
      --panel-2: #1b1b23;
      --line: #333342;
      --cyan: #24efff;
      --pink: #ff3b92;
      --yellow: #ffe65a;
      --purple: #a86bff;
      --green: #7df5ac;
      --white: #f8fbff;
      --muted: #a8a8b8;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      align-items: center;
      background:
        radial-gradient(circle at 50% 8%, rgba(36, 239, 255, .16), transparent 34rem),
        radial-gradient(circle at 18% 82%, rgba(255, 59, 146, .12), transparent 24rem),
        linear-gradient(#050507, var(--bg));
      color: var(--white);
      display: flex;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      justify-content: center;
      margin: 0;
      overflow: hidden;
      padding: 16px;
      touch-action: none;
    }

    body::before {
      background: linear-gradient(rgba(255, 255, 255, .04) 50%, rgba(0, 0, 0, .18) 50%);
      background-size: 100% 4px;
      content: "";
      inset: 0;
      opacity: .45;
      pointer-events: none;
      position: fixed;
      z-index: 2;
    }

    main {
      width: min(420px, calc(100vw - 24px));
    }

    .title {
      margin: 0 0 10px;
      text-align: center;
      text-transform: uppercase;
    }

    .title__eyebrow {
      color: var(--cyan);
      display: block;
      font-size: .75rem;
      font-weight: 700;
      margin-bottom: 5px;
      text-shadow: 0 0 12px rgba(36, 239, 255, .7);
    }

    .title__name {
      color: var(--white);
      display: block;
      font-size: 1.45rem;
      font-weight: 900;
      text-shadow: 0 0 14px rgba(36, 239, 255, .74), 0 0 24px rgba(255, 59, 146, .52);
    }

    .cabinet {
      background: linear-gradient(145deg, #20202b 0%, #0c0c12 58%, #17171f 100%);
      border: 3px solid #2f2f3f;
      border-radius: 18px;
      box-shadow: 0 24px 70px rgba(0, 0, 0, .7), 0 0 34px rgba(36, 239, 255, .18);
      padding: 12px;
    }

    .marquee {
      background: #050507;
      border: 2px solid var(--cyan);
      color: var(--cyan);
      font-size: 1rem;
      font-weight: 900;
      margin-bottom: 10px;
      padding: 9px 8px;
      text-align: center;
      text-shadow: 0 0 12px rgba(36, 239, 255, .9);
      text-transform: uppercase;
    }

    .screen {
      background: #000;
      border: 4px solid #050506;
      border-radius: 8px;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .08), inset 0 0 35px rgba(36, 239, 255, .08);
      overflow: hidden;
      position: relative;
    }

    .screen::after {
      background: linear-gradient(rgba(255, 255, 255, 0) 50%, rgba(0, 0, 0, .22) 50%);
      background-size: 100% 3px;
      content: "";
      inset: 0;
      pointer-events: none;
      position: absolute;
    }

    canvas {
      aspect-ratio: 3 / 4;
      display: block;
      height: auto;
      image-rendering: crisp-edges;
      width: 100%;
    }

    .panel {
      background: var(--panel);
      border-top: 3px solid var(--pink);
      margin-top: 10px;
      padding: 10px;
    }

    .stats {
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(3, 1fr);
      margin-bottom: 10px;
    }

    .stat {
      background: var(--panel-2);
      border: 1px solid var(--line);
      min-height: 42px;
      padding: 7px 6px;
      text-align: center;
    }

    .stat span {
      color: var(--muted);
      display: block;
      font-size: .58rem;
      margin-bottom: 3px;
      text-transform: uppercase;
    }

    .stat strong {
      color: var(--white);
      display: block;
      font-size: .9rem;
    }

    .controls {
      color: #d7d7e6;
      font-size: .72rem;
      line-height: 1.45;
      margin: 0;
      text-align: center;
    }

    .controls strong {
      color: var(--yellow);
    }

    @media (max-height: 720px) {
      body {
        padding: 8px;
      }

      .title {
        margin-bottom: 6px;
      }

      .title__name {
        font-size: 1.15rem;
      }

      .cabinet {
        padding: 8px;
      }

      .marquee,
      .panel {
        margin-bottom: 7px;
      }

      .panel {
        margin-top: 7px;
        padding: 8px;
      }
    }
  </style>
</head>
<body>
  <main data-game-root>
    <h1 class="title">
      <span class="title__eyebrow">Pocket Server Presents</span>
      <span class="title__name">Pocket Arkanoid</span>
    </h1>

    <section class="cabinet" aria-label="Pocket Arkanoid arcade cabinet">
      <div class="marquee">Arkanoid Signal</div>
      <div class="screen">
        <canvas id="game" width="360" height="480" aria-label="Arkanoid game canvas"></canvas>
      </div>
      <div class="panel">
        <div class="stats" aria-live="polite">
          <div class="stat"><span>Score</span><strong id="score">0</strong></div>
          <div class="stat"><span>Lives</span><strong id="lives">3</strong></div>
          <div class="stat"><span>Level</span><strong id="level">1</strong></div>
        </div>
        <p class="controls">
          <strong>Tap or press Space to launch.</strong><br>
          Drag, tap sides, or use Arrow keys / A D.
        </p>
      </div>
    </section>
  </main>

  <script>
    (() => {
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");
      const scoreEl = document.getElementById("score");
      const livesEl = document.getElementById("lives");
      const levelEl = document.getElementById("level");
      const W = canvas.width;
      const H = canvas.height;
      const keys = new Set();
      const palette = ["#24efff", "#ff3b92", "#ffe65a", "#a86bff", "#7df5ac"];

      const state = {
        score: 0,
        lives: 3,
        level: 1,
        running: false,
        over: false,
        won: false,
        flash: 0,
        paddle: { x: 132, y: 436, w: 96, h: 12, speed: 7 },
        ball: { x: 180, y: 420, r: 6, dx: 3, dy: -4 },
        bricks: [],
        particles: []
      };

      function resetBall(stickToPaddle = true) {
        state.running = !stickToPaddle;
        state.ball.x = state.paddle.x + state.paddle.w / 2;
        state.ball.y = state.paddle.y - 12;
        state.ball.dx = state.level % 2 ? 3.1 : -3.1;
        state.ball.dy = -4.2 - Math.min(state.level, 4) * .25;
      }

      function buildBricks() {
        const rows = Math.min(5 + state.level, 8);
        const cols = 8;
        const gap = 5;
        const brickW = (W - 42 - (cols - 1) * gap) / cols;
        const brickH = 17;
        state.bricks = [];

        for (let row = 0; row < rows; row += 1) {
          for (let col = 0; col < cols; col += 1) {
            const armored = row === 0 && state.level > 2 && col % 2 === 0;
            state.bricks.push({
              x: 21 + col * (brickW + gap),
              y: 72 + row * (brickH + gap),
              w: brickW,
              h: brickH,
              hp: armored ? 2 : 1,
              color: palette[(row + col + state.level) % palette.length]
            });
          }
        }
      }

      function newGame() {
        state.score = 0;
        state.lives = 3;
        state.level = 1;
        state.over = false;
        state.won = false;
        state.paddle.x = 132;
        state.particles = [];
        buildBricks();
        resetBall(true);
        syncStats();
      }

      function syncStats() {
        scoreEl.textContent = state.score;
        livesEl.textContent = state.lives;
        levelEl.textContent = state.level;
      }

      function clampPaddle() {
        state.paddle.x = Math.max(16, Math.min(W - 16 - state.paddle.w, state.paddle.x));
      }

      function launch() {
        if (state.over || state.won) {
          newGame();
          return;
        }
        if (!state.running) state.running = true;
      }

      function setPaddleFromClientX(clientX) {
        const rect = canvas.getBoundingClientRect();
        const scale = W / rect.width;
        state.paddle.x = (clientX - rect.left) * scale - state.paddle.w / 2;
        clampPaddle();
        launch();
      }

      function tapSide(clientX) {
        const rect = canvas.getBoundingClientRect();
        const side = clientX - rect.left < rect.width / 2 ? -1 : 1;
        state.paddle.x += side * 34;
        clampPaddle();
        launch();
      }

      canvas.addEventListener("pointerdown", event => {
        canvas.setPointerCapture(event.pointerId);
        if (event.pointerType === "touch") tapSide(event.clientX);
        else setPaddleFromClientX(event.clientX);
      });
      canvas.addEventListener("pointermove", event => {
        if (event.buttons || event.pointerType === "touch") setPaddleFromClientX(event.clientX);
      });

      window.addEventListener("keydown", event => {
        if (["ArrowLeft", "ArrowRight", " ", "a", "A", "d", "D"].includes(event.key)) {
          event.preventDefault();
        }
        if (event.key === " ") launch();
        keys.add(event.key.toLowerCase());
      });
      window.addEventListener("keyup", event => keys.delete(event.key.toLowerCase()));

      function burst(x, y, color) {
        for (let i = 0; i < 10; i += 1) {
          state.particles.push({
            x,
            y,
            dx: (Math.random() - .5) * 5,
            dy: (Math.random() - .5) * 5,
            life: 24 + Math.random() * 16,
            color
          });
        }
      }

      function loseLife() {
        state.lives -= 1;
        state.flash = 16;
        syncStats();
        if (state.lives <= 0) {
          state.over = true;
          state.running = false;
          return;
        }
        resetBall(true);
      }

      function nextLevel() {
        state.level += 1;
        state.paddle.w = Math.max(68, 96 - (state.level - 1) * 6);
        buildBricks();
        resetBall(true);
        syncStats();
      }

      function update() {
        if (keys.has("arrowleft") || keys.has("a")) state.paddle.x -= state.paddle.speed;
        if (keys.has("arrowright") || keys.has("d")) state.paddle.x += state.paddle.speed;
        clampPaddle();

        if (!state.running && !state.over && !state.won) {
          state.ball.x = state.paddle.x + state.paddle.w / 2;
          state.ball.y = state.paddle.y - 12;
        }

        if (state.running) {
          const ball = state.ball;
          ball.x += ball.dx;
          ball.y += ball.dy;

          if (ball.x - ball.r <= 14 || ball.x + ball.r >= W - 14) {
            ball.dx *= -1;
            ball.x = Math.max(14 + ball.r, Math.min(W - 14 - ball.r, ball.x));
          }
          if (ball.y - ball.r <= 42) {
            ball.dy = Math.abs(ball.dy);
            ball.y = 42 + ball.r;
          }
          if (ball.y - ball.r > H) loseLife();

          const p = state.paddle;
          const hitsPaddle = ball.y + ball.r >= p.y && ball.y - ball.r <= p.y + p.h && ball.x >= p.x && ball.x <= p.x + p.w;
          if (hitsPaddle && ball.dy > 0) {
            const offset = (ball.x - (p.x + p.w / 2)) / (p.w / 2);
            ball.dx = offset * 5.2;
            ball.dy = -Math.abs(ball.dy) - .04;
            ball.y = p.y - ball.r - 1;
          }

          for (let i = state.bricks.length - 1; i >= 0; i -= 1) {
            const b = state.bricks[i];
            const hit = ball.x + ball.r >= b.x && ball.x - ball.r <= b.x + b.w && ball.y + ball.r >= b.y && ball.y - ball.r <= b.y + b.h;
            if (!hit) continue;

            b.hp -= 1;
            ball.dy *= -1;
            state.flash = 5;
            burst(ball.x, ball.y, b.color);
            if (b.hp <= 0) {
              state.bricks.splice(i, 1);
              state.score += 100 * state.level;
              syncStats();
            }
            break;
          }

          if (state.bricks.length === 0) {
            if (state.level >= 5) {
              state.won = true;
              state.running = false;
            } else {
              nextLevel();
            }
          }
        }

        state.particles = state.particles.filter(p => {
          p.x += p.dx;
          p.y += p.dy;
          p.dy += .08;
          p.life -= 1;
          return p.life > 0;
        });
        if (state.flash > 0) state.flash -= 1;
      }

      function drawGrid() {
        ctx.strokeStyle = "rgba(36,239,255,.06)";
        ctx.lineWidth = 1;
        for (let y = 42; y < H; y += 24) {
          ctx.beginPath();
          ctx.moveTo(14, y);
          ctx.lineTo(W - 14, y);
          ctx.stroke();
        }
      }

      function drawTextOverlay(title, line) {
        ctx.fillStyle = "rgba(3,3,8,.78)";
        ctx.fillRect(22, 174, W - 44, 112);
        ctx.strokeStyle = "#24efff";
        ctx.lineWidth = 2;
        ctx.strokeRect(24, 176, W - 48, 108);
        ctx.textAlign = "center";
        ctx.fillStyle = "#f8fbff";
        ctx.font = "700 19px ui-monospace, monospace";
        ctx.fillText(title, W / 2, 218);
        ctx.fillStyle = "#ffe65a";
        ctx.font = "12px ui-monospace, monospace";
        ctx.fillText(line, W / 2, 244);
        ctx.textAlign = "left";
      }

      function render() {
        ctx.clearRect(0, 0, W, H);
        ctx.fillStyle = "#050508";
        ctx.fillRect(0, 0, W, H);

        const glow = ctx.createRadialGradient(W / 2, 130, 40, W / 2, 170, 260);
        glow.addColorStop(0, "rgba(168,107,255,.22)");
        glow.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = glow;
        ctx.fillRect(0, 0, W, H);

        ctx.fillStyle = "#191923";
        ctx.fillRect(0, 0, W, 42);
        ctx.fillStyle = "#24efff";
        ctx.fillRect(14, 40, W - 28, 2);
        drawGrid();

        ctx.fillStyle = "#181822";
        ctx.fillRect(0, 42, 14, H - 42);
        ctx.fillRect(W - 14, 42, 14, H - 42);

        for (const b of state.bricks) {
          ctx.fillStyle = b.color;
          ctx.fillRect(b.x, b.y, b.w, b.h);
          ctx.fillStyle = "rgba(255,255,255,.34)";
          ctx.fillRect(b.x + 2, b.y + 2, b.w - 4, 3);
          if (b.hp > 1) {
            ctx.strokeStyle = "#f8fbff";
            ctx.strokeRect(b.x + 3, b.y + 3, b.w - 6, b.h - 6);
          }
        }

        for (const p of state.particles) {
          ctx.globalAlpha = Math.max(0, p.life / 32);
          ctx.fillStyle = p.color;
          ctx.fillRect(p.x, p.y, 3, 3);
        }
        ctx.globalAlpha = 1;

        const paddleGradient = ctx.createLinearGradient(state.paddle.x, 0, state.paddle.x + state.paddle.w, 0);
        paddleGradient.addColorStop(0, "#24efff");
        paddleGradient.addColorStop(.5, "#f8fbff");
        paddleGradient.addColorStop(1, "#ff3b92");
        ctx.fillStyle = paddleGradient;
        ctx.fillRect(state.paddle.x, state.paddle.y, state.paddle.w, state.paddle.h);
        ctx.fillStyle = "rgba(255,255,255,.6)";
        ctx.fillRect(state.paddle.x + 8, state.paddle.y + 2, state.paddle.w - 16, 2);

        ctx.shadowColor = "#24efff";
        ctx.shadowBlur = 16;
        ctx.fillStyle = "#f8fbff";
        ctx.beginPath();
        ctx.arc(state.ball.x, state.ball.y, state.ball.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;

        ctx.fillStyle = "#f8fbff";
        ctx.font = "700 12px ui-monospace, monospace";
        ctx.fillText(`SCORE ${state.score}`, 18, 26);
        ctx.fillText(`LIVES ${state.lives}`, 142, 26);
        ctx.fillText(`LV ${state.level}`, 286, 26);

        if (!state.running && !state.over && !state.won) drawTextOverlay("READY", "TAP OR PRESS SPACE");
        if (state.over) drawTextOverlay("GAME OVER", "TAP OR SPACE TO RESTART");
        if (state.won) drawTextOverlay("SIGNAL CLEARED", "TAP OR SPACE TO RESTART");

        if (state.flash > 0) {
          ctx.fillStyle = `rgba(255,255,255,${state.flash / 70})`;
          ctx.fillRect(0, 0, W, H);
        }
      }

      function loop() {
        update();
        render();
        requestAnimationFrame(loop);
      }

      newGame();
      loop();
    })();
  </script>
</body>
</html>
