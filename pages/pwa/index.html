<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f8dd5f">
  <meta name="description" content="Pocket Store offline companion.">
  <title>Pocket Store</title>
  <link rel="manifest" href="/pwa/manifest.webmanifest">
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://cdn.shopify.com">
  <link rel="preconnect" href="https://roxanneassoulin.com">
  <link rel="stylesheet" href="/store/assets/store.min.css">
  <link rel="stylesheet" href="/pwa/app.css">
  <script defer src="/pwa/app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/pwa/service-worker.js", { scope: "/pwa/" }).catch(() => {});
      });
    }
  </script>
</head>
<body data-pwa-root>
  <div class="announcement">free US shipping over $250</div>
  <header class="site-header header">
    <button class="site-header__menu header__toggle" type="button" aria-label="Toggle menu" aria-expanded="false" aria-controls="store-menu" data-menu-toggle><span>Toggle Menu</span></button>
    <nav class="nav" aria-label="Store">
      <a href="#home">new arrivals</a>
      <a href="#home">best sellers</a>
      <a href="#home">necklaces</a>
      <a href="#home">bracelets</a>
    </nav>
    <a class="brand header__logo" href="#home">
      <img src="https://roxanneassoulin.com/cdn/shop/t/147/assets/roxane-assoulin-logo.png?v=157219181899558921191761553533" alt="Roxanne Assoulin" width="580" height="42">
    </a>
    <button class="store-search header__search-toggle" type="button" aria-expanded="false" aria-controls="search-drawer" data-search-open><span>Toggle Search</span></button>
    <nav class="header-extra desktop-visible" aria-label="Account links">
      <a href="#home">Login</a>
      <a href="#home">About</a>
    </nav>
    <button class="cart-link header__cart header__cart--drawer desktop-visible" type="button" aria-expanded="false" aria-controls="cart-drawer" data-cart-open><span class="bag-label">Bag </span><span data-cart-count>0</span></button>
    <a class="cart-link header__cart header__cart--page mobile-visible" href="#cart" aria-label="Open bag, 0 items"><span data-cart-count>0</span></a>
  </header>

  <div class="shipping-promo js-shippingPromo" role="region" aria-label="Shipping promotion" data-shipping-promo>
    <span>Enjoy complimentary ground shipping on US orders $250+</span>
    <button class="shipping-promo__close" type="button" aria-label="Close shipping message" data-shipping-promo-close></button>
  </div>

  <main role="main" id="main" class="content">
    <h1 class="visually-hidden">Pocket Store</h1>
    <div class="pwa-status-chip" data-pwa-status>Loading catalogue…</div>
    <div class="home" data-view></div>
  </main>
  <div class="pwa-outbox" data-outbox hidden></div>
</body>
</html>
