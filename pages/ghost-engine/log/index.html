<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ghost Engine Log</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #040506;
      --panel: #0f1419;
      --line: #1f3140;
      --text: #c8f7ff;
      --accent: #72f1b8;
      --warn: #ffd166;
      --red: #ff6b6b;
    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      padding: 20px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      background:
        radial-gradient(circle at 50% 0%, rgba(114,241,184,.12), transparent 35rem),
        linear-gradient(180deg, #040506, var(--bg));
      color: var(--text);
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.05) 0,
        rgba(255,255,255,.05) 1px,
        transparent 1px,
        transparent 4px
      );
      opacity: .35;
    }
    .shell {
      position: relative;
      max-width: 980px;
      margin: 0 auto;
      background: rgba(15, 20, 25, .96);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 24px 70px rgba(0,0,0,.55);
      overflow: hidden;
    }
    .top {
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      background: linear-gradient(180deg, rgba(114,241,184,.08), transparent);
    }
    h1 {
      margin: 0;
      font-size: clamp(1.5rem, 3vw, 2.4rem);
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--accent);
      text-shadow: 0 0 12px rgba(114,241,184,.55);
    }
    .status {
      color: var(--warn);
      font-size: .85rem;
      text-transform: uppercase;
      letter-spacing: .16em;
    }
    .screen {
      padding: 20px;
      min-height: 60vh;
      background: radial-gradient(circle at top, rgba(114,241,184,.08), transparent 22rem);
    }
    .section {
      margin: 0 0 20px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255,255,255,.02);
    }
    .section h2 {
      margin: 0 0 10px;
      color: var(--warn);
      font-size: .82rem;
      letter-spacing: .18em;
      text-transform: uppercase;
    }
    .kicker {
      color: var(--accent);
      font-size: 1.1rem;
      margin-bottom: 8px;
    }
    .line {
      margin: 0;
      white-space: pre-wrap;
      line-height: 1.55;
      font-size: 1rem;
    }
    ul {
      margin: 0;
      padding-left: 18px;
      line-height: 1.55;
    }
    li { margin-bottom: 6px; }
    .cursor {
      display: inline-block;
      width: 9px;
      background: var(--accent);
      margin-left: 6px;
      animation: blink 1s steps(1) infinite;
      vertical-align: baseline;
    }
    @keyframes blink { 50% { opacity: 0; } }
    .footer {
      padding: 14px 20px;
      border-top: 1px solid var(--line);
      color: rgba(200, 247, 255, .72);
      font-size: .82rem;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <section class="shell">
    <header class="top">
      <div>
        <h1>Ghost Engine Log</h1>
        <div class="status">CRT stream / self-refreshing log playback</div>
      </div>
      <div class="status" id="mode">loading...</div>
    </header>
    <main class="screen">
      <section class="section">
        <h2>Current task</h2>
        <div class="kicker" id="currentTask">loading...</div>
      </section>
      <section class="section">
        <h2>Pending tasks</h2>
        <ul id="pendingTasks"></ul>
      </section>
      <section class="section">
        <h2>Completed steps</h2>
        <ul id="completedSteps"></ul>
      </section>
      <section class="section">
        <h2>Blocker</h2>
        <div class="line" id="blocker"></div>
      </section>
      <section class="section">
        <h2>Next action</h2>
        <div class="line" id="nextAction"></div>
      </section>
      <section class="section">
        <h2>Log entries</h2>
        <pre class="line" id="entries"></pre>
      </section>
      <span class="cursor" aria-hidden="true">&nbsp;</span>
    </main>
    <footer class="footer">
      <a href="/ghost-engine/">Back to Ghost Engine</a>
      &nbsp;|&nbsp;
      <a href="/ghost-engine/log.json">Raw log</a>
    </footer>
  </section>

  <script>
    const currentTask = document.getElementById("currentTask");
    const pendingTasks = document.getElementById("pendingTasks");
    const completedSteps = document.getElementById("completedSteps");
    const blocker = document.getElementById("blocker");
    const nextAction = document.getElementById("nextAction");
    const entries = document.getElementById("entries");
    const mode = document.getElementById("mode");

    function renderList(node, items) {
      node.innerHTML = items.map((item) => `<li>${item}</li>`).join("");
    }

    async function main() {
      try {
        const res = await fetch("../log.json?ts=" + Date.now(), { cache: "no-store" });
        const data = await res.json();
        mode.textContent = "online";
        currentTask.textContent = data.current_task || "unknown";
        renderList(pendingTasks, (data.pending_tasks || []).map((item) => item));
        renderList(completedSteps, (data.completed_steps || []).map((item) => item));
        blocker.textContent = data.blocker || "none";
        nextAction.textContent = data.next_action || "none";
        entries.textContent = [
          `> ${data.title || "Ghost Engine"}`,
          `> ${"=".repeat((data.title || "Ghost Engine").length)}`,
          ...(data.entries || []).map((entry) => [
            `> ${entry.time}`,
            `  decision: ${entry.decision}`,
            `  reason: ${entry.reason}`,
            `  next: ${entry.next_action}`,
          ].join("\n")),
        ].join("\n\n");
      } catch (error) {
        mode.textContent = "offline";
        currentTask.textContent = "log unavailable";
        pendingTasks.innerHTML = "";
        completedSteps.innerHTML = "";
        blocker.textContent = String(error);
        nextAction.textContent = "retry after reload";
        entries.textContent = "";
      }
    }

    main();
    setInterval(main, 10000);
  </script>
</body>
</html>
