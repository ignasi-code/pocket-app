<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ghost Engine</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #05070a;
      --panel: #10171d;
      --line: #203040;
      --text: #e8f0ff;
      --muted: #8ea4bf;
      --accent: #72f1b8;
      --warn: #ffd166;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(114, 241, 184, .14), transparent 30rem),
        linear-gradient(180deg, #06080b, var(--bg));
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.04) 0,
        rgba(255,255,255,.04) 2px,
        transparent 2px,
        transparent 4px
      );
      opacity: .35;
    }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 24px; position: relative; }
    .panel {
      background: rgba(16, 23, 29, .92);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 20px 60px rgba(0,0,0,.45);
      padding: 20px;
    }
    h1 { margin: 0 0 8px; font-size: clamp(2rem, 4vw, 3.5rem); letter-spacing: .08em; }
    .eyebrow { color: var(--accent); text-transform: uppercase; font-size: .82rem; letter-spacing: .2em; }
    .muted { color: var(--muted); }
    .links { display:flex; gap: 12px; flex-wrap: wrap; margin-top: 18px; }
    a {
      color: var(--text);
      text-decoration: none;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 10px 14px;
      background: rgba(255,255,255,.03);
    }
    a:hover { border-color: var(--accent); color: var(--accent); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <div class="eyebrow">Pocket Server / Ghost Engine</div>
      <h1>Ghost Engine</h1>
      <p class="muted">Reusable B2B lead-to-fulfillment engine. Static v0.1 surface only.</p>
      <div class="links">
        <a href="/ghost-engine/log/">Open log stream</a>
        <a href="/ghost-engine/log.json">Raw log</a>
      </div>
    </div>
  </div>
</body>
</html>
