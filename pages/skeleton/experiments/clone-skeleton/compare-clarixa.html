<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Clone Skeleton Compare</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        background: #151515;
        color: #fff;
        font-family: Arial, Helvetica, sans-serif;
      }

      .compare {
        display: grid;
        grid-template-columns: 1fr 1fr;
        height: 100vh;
      }

      .pane {
        border-right: 1px solid #4a4a4a;
        display: grid;
        grid-template-rows: 36px 1fr;
        min-width: 0;
      }

      .pane:last-child {
        border-right: 0;
      }

      .label {
        align-items: center;
        background: #202020;
        border-bottom: 1px solid #4a4a4a;
        display: flex;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: .04em;
        padding: 0 12px;
        text-transform: uppercase;
      }

      .scroll {
        background: #fff;
        overflow: auto;
      }

      .source {
        display: block;
        height: auto;
        margin: 0 auto;
        width: 430px;
      }

      iframe {
        border: 0;
        display: block;
        height: 13913px;
        margin: 0 auto;
        width: 430px;
      }

      @media (max-width: 760px) {
        .compare {
          grid-template-columns: 1fr;
          grid-template-rows: 50vh 50vh;
        }

        .pane {
          border-bottom: 1px solid #4a4a4a;
          border-right: 0;
        }
      }
    </style>
  </head>
  <body>
    <main class="compare">
      <section class="pane" aria-label="Original source screenshot">
        <div class="label">Source Screenshot</div>
        <div class="scroll">
          <img class="source" src="../../assets/source-clarixa.png?cdp=1" alt="" />
        </div>
      </section>
      <section class="pane" aria-label="Generated clone skeleton">
        <div class="label">Generated Skeleton</div>
        <div class="scroll">
          <iframe src="clarixa.html" title="Generated clone skeleton"></iframe>
        </div>
      </section>
    </main>
  </body>
</html>
