<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Home Skeleton</title>
    <link rel="stylesheet" href="../styles.css" />
    <style>
      .screen { min-height: 14980px; }
      .hero { height: 932px; padding: 76px 16px 0; background: #f0f0ef; display: grid; align-content: start; gap: 30px; }
      .hero-media { height: 330px; margin: 26px -16px 0; background: #e2e2df; }
      .home-section { padding: 48px 16px; border-top: 1px solid #242424; display: grid; gap: 24px; }
      .tile { height: 360px; background: #f0f0ef; }
      .floating-cta { width: 398px; height: 48px; border-radius: 4px; background: #050505; }
    </style>
  </head>
  <body>
    <div class="screen" aria-busy="true">
      <header class="topbar"><a class="bone logo" href="home.html"></a><div class="icons"><a class="bone icon" href="cart.html"></a><span class="bone icon"></span><span class="bone icon"></span></div></header>
      <section class="hero">
        <span class="bone" style="width: 180px; height: 68px"></span>
        <span class="bone line" style="width: 92%"></span>
        <span class="bone line" style="width: 78%"></span>
        <a class="floating-cta" href="category.html"></a>
        <div class="hero-media"></div>
      </section>
      <section class="home-section" style="height: 1320px"><span class="bone" style="width: 300px; height: 48px"></span><div class="tile"></div><div class="two"><span class="bone line"></span><span class="bone line"></span></div></section>
      <section class="home-section bone-soft" style="height: 1560px"><span class="bone" style="width: 260px; height: 44px"></span><div class="tile"></div><div class="tile"></div></section>
      <section class="home-section" style="height: 1680px"><span class="bone" style="width: 340px; height: 50px"></span><div class="two"><div class="tile"></div><div class="tile"></div></div><div class="stack"><span class="bone line"></span><span class="bone line" style="width: 86%"></span><span class="bone line" style="width: 74%"></span></div></section>
      <section class="home-section bone-soft" style="height: 1780px"><span class="bone" style="width: 310px; height: 46px"></span><div class="tile" style="height: 520px"></div><div class="stack"><span class="bone line"></span><span class="bone line"></span><span class="bone line" style="width: 68%"></span></div></section>
      <section class="home-section" style="height: 1980px"><span class="bone" style="width: 280px; height: 44px"></span><div class="panel" style="height: 320px"></div><div class="panel" style="height: 320px"></div><div class="panel" style="height: 320px"></div></section>
      <section class="home-section bone-soft" style="height: 1900px"><span class="bone" style="width: 330px; height: 48px"></span><div class="tile" style="height: 620px"></div><a class="floating-cta" href="category.html"></a></section>
      <section class="home-section" style="height: 3829px"><span class="bone" style="width: 260px; height: 44px"></span><div class="stack"><span class="bone line"></span><span class="bone line" style="width: 88%"></span><span class="bone line" style="width: 72%"></span></div></section>
    </div>
  </body>
</html>
