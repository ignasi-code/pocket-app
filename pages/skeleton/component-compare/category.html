<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Category Component Compare</title>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; background: #111; color: #f7f7f7; font-family: Arial, Helvetica, sans-serif; }
      header { position: sticky; top: 0; z-index: 2; display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 12px 16px; border-bottom: 1px solid #333; background: #171717; }
      a { color: #fff; font-weight: 700; }
      main { width: min(100%, 980px); margin: 0 auto; padding: 18px 16px 80px; }
      .component { margin-bottom: 28px; border: 1px solid #333; border-radius: 8px; overflow: hidden; background: #1a1a1a; }
      .component h2 { margin: 0; padding: 12px 14px; border-bottom: 1px solid #333; font-size: 14px; text-transform: uppercase; letter-spacing: 0.03em; }
      .pair { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: #333; }
      figure { margin: 0; background: #fff; }
      figcaption { padding: 8px 10px; background: #222; color: #fff; font-size: 12px; text-transform: uppercase; }
      img { display: block; width: 430px; max-width: 100%; height: auto; margin: 0 auto; background: #fff; }
      @media (max-width: 900px) { .pair { grid-template-columns: 1fr; } }

    </style>
  </head>
  <body>
    <header>
      <a href="../index.html">Inventory</a>
      <a href="../compare/category.html">Page Compare</a>
    </header>
    <main>
      <section class="component"><h2>Header</h2><div class="pair"><figure><figcaption>Source</figcaption><img src="category/source-header.jpg" alt="source header" /></figure><figure><figcaption>Skeleton</figcaption><img src="category/skeleton-header.jpg" alt="skeleton header" /></figure></div></section>
      <section class="component"><h2>Collection Hero</h2><div class="pair"><figure><figcaption>Source</figcaption><img src="category/source-collection-hero.jpg" alt="source collection-hero" /></figure><figure><figcaption>Skeleton</figcaption><img src="category/skeleton-collection-hero.jpg" alt="skeleton collection-hero" /></figure></div></section>
      <section class="component"><h2>Treatment Section Heading</h2><div class="pair"><figure><figcaption>Source</figcaption><img src="category/source-section-heading.jpg" alt="source section-heading" /></figure><figure><figcaption>Skeleton</figcaption><img src="category/skeleton-section-heading.jpg" alt="skeleton section-heading" /></figure></div></section>
      <section class="component"><h2>Product Card Template</h2><div class="pair"><figure><figcaption>Source</figcaption><img src="category/source-product-card-template.jpg" alt="source product-card-template" /></figure><figure><figcaption>Skeleton</figcaption><img src="category/skeleton-product-card-template.jpg" alt="skeleton product-card-template" /></figure></div></section>
      <section class="component"><h2>Product Row Template</h2><div class="pair"><figure><figcaption>Source</figcaption><img src="category/source-product-row-template.jpg" alt="source product-row-template" /></figure><figure><figcaption>Skeleton</figcaption><img src="category/skeleton-product-row-template.jpg" alt="skeleton product-row-template" /></figure></div></section>
      <section class="component"><h2>Acne Section</h2><div class="pair"><figure><figcaption>Source</figcaption><img src="category/source-acne-section.jpg" alt="source acne-section" /></figure><figure><figcaption>Skeleton</figcaption><img src="category/skeleton-acne-section.jpg" alt="skeleton acne-section" /></figure></div></section>
      <section class="component"><h2>Body Treatments Section</h2><div class="pair"><figure><figcaption>Source</figcaption><img src="category/source-body-treatments-section.jpg" alt="source body-treatments-section" /></figure><figure><figcaption>Skeleton</figcaption><img src="category/skeleton-body-treatments-section.jpg" alt="skeleton body-treatments-section" /></figure></div></section>
      <section class="component"><h2>Category Footer CTA</h2><div class="pair"><figure><figcaption>Source</figcaption><img src="category/source-category-footer-cta.jpg" alt="source category-footer-cta" /></figure><figure><figcaption>Skeleton</figcaption><img src="category/skeleton-category-footer-cta.jpg" alt="skeleton category-footer-cta" /></figure></div></section>
    </main>
  </body>
</html>
