<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cart Component Compare</title>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; background: #111; color: #f7f7f7; font-family: Arial, Helvetica, sans-serif; }
      header { position: sticky; top: 0; z-index: 2; display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 12px 16px; border-bottom: 1px solid #333; background: #171717; }
      a { color: #fff; font-weight: 700; }
      main { width: min(100%, 980px); margin: 0 auto; padding: 18px 16px 80px; }
      .component { margin-bottom: 28px; border: 1px solid #333; border-radius: 8px; overflow: hidden; background: #1a1a1a; }
      .component h2 { margin: 0; padding: 12px 14px; border-bottom: 1px solid #333; font-size: 14px; text-transform: uppercase; letter-spacing: 0.03em; }
      .pair { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: #333; }
      figure { margin: 0; background: #fff; }
      figcaption { padding: 8px 10px; background: #222; color: #fff; font-size: 12px; text-transform: uppercase; }
      img { display: block; width: 430px; max-width: 100%; height: auto; margin: 0 auto; background: #fff; }
      @media (max-width: 900px) { .pair { grid-template-columns: 1fr; } }

    </style>
  </head>
  <body>
    <header>
      <a href="../index.html">Inventory</a>
      <a href="../compare/cart.html">Page Compare</a>
    </header>
    <main>
      <section class="component"><h2>Header With Cart Count</h2><div class="pair"><figure><figcaption>Source</figcaption><img src="cart/source-header.jpg" alt="source header" /></figure><figure><figcaption>Skeleton</figcaption><img src="cart/skeleton-header.jpg" alt="skeleton header" /></figure></div></section>
      <section class="component"><h2>Open Cart Drawer Shell</h2><div class="pair"><figure><figcaption>Source</figcaption><img src="cart/source-drawer-shell.jpg" alt="source drawer-shell" /></figure><figure><figcaption>Skeleton</figcaption><img src="cart/skeleton-drawer-shell.jpg" alt="skeleton drawer-shell" /></figure></div></section>
      <section class="component"><h2>Free Shipping Status</h2><div class="pair"><figure><figcaption>Source</figcaption><img src="cart/source-shipping-status.jpg" alt="source shipping-status" /></figure><figure><figcaption>Skeleton</figcaption><img src="cart/skeleton-shipping-status.jpg" alt="skeleton shipping-status" /></figure></div></section>
      <section class="component"><h2>Cart Items List</h2><div class="pair"><figure><figcaption>Source</figcaption><img src="cart/source-cart-items-list.jpg" alt="source cart-items-list" /></figure><figure><figcaption>Skeleton</figcaption><img src="cart/skeleton-cart-items-list.jpg" alt="skeleton cart-items-list" /></figure></div></section>
      <section class="component"><h2>Paid Product Line Item</h2><div class="pair"><figure><figcaption>Source</figcaption><img src="cart/source-paid-line-item.jpg" alt="source paid-line-item" /></figure><figure><figcaption>Skeleton</figcaption><img src="cart/skeleton-paid-line-item.jpg" alt="skeleton paid-line-item" /></figure></div></section>
      <section class="component"><h2>Subscription Gift Line</h2><div class="pair"><figure><figcaption>Source</figcaption><img src="cart/source-gift-line-item.jpg" alt="source gift-line-item" /></figure><figure><figcaption>Skeleton</figcaption><img src="cart/skeleton-gift-line-item.jpg" alt="skeleton gift-line-item" /></figure></div></section>
      <section class="component"><h2>Total, Payment, And Checkout CTA</h2><div class="pair"><figure><figcaption>Source</figcaption><img src="cart/source-total-payment-checkout.jpg" alt="source total-payment-checkout" /></figure><figure><figcaption>Skeleton</figcaption><img src="cart/skeleton-total-payment-checkout.jpg" alt="skeleton total-payment-checkout" /></figure></div></section>
    </main>
  </body>
</html>
