<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PDP Component Compare</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #111;
        color: #f7f7f7;
        font-family: Arial, Helvetica, sans-serif;
      }

      header {
        position: sticky;
        top: 0;
        z-index: 2;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 12px 16px;
        border-bottom: 1px solid #333;
        background: #171717;
      }

      a {
        color: #fff;
        font-weight: 700;
      }

      main {
        width: min(100%, 980px);
        margin: 0 auto;
        padding: 18px 16px 80px;
      }

      .component {
        margin-bottom: 28px;
        border: 1px solid #333;
        border-radius: 8px;
        overflow: hidden;
        background: #1a1a1a;
      }

      .component h2 {
        margin: 0;
        padding: 12px 14px;
        border-bottom: 1px solid #333;
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 0.03em;
      }

      .pair {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1px;
        background: #333;
      }

      figure {
        margin: 0;
        background: #fff;
      }

      figcaption {
        padding: 8px 10px;
        background: #222;
        color: #fff;
        font-size: 12px;
        text-transform: uppercase;
      }

      img {
        display: block;
        width: 430px;
        max-width: 100%;
        height: auto;
        margin: 0 auto;
        background: #fff;
      }

      @media (max-width: 900px) {
        .pair {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <a href="../index.html">Inventory</a>
      <a href="../compare/pdp.html">Page Compare</a>
    </header>
    <main>
      <section class="component"><h2>Header</h2><div class="pair"><figure><figcaption>Source</figcaption><img src="pdp/source-header.png" alt="source header" /></figure><figure><figcaption>Skeleton</figcaption><img src="pdp/skeleton-header.png" alt="skeleton header" /></figure></div></section>
      <section class="component"><h2>Hero Copy</h2><div class="pair"><figure><figcaption>Source</figcaption><img src="pdp/source-hero-copy.png" alt="source hero copy" /></figure><figure><figcaption>Skeleton</figcaption><img src="pdp/skeleton-hero-copy.png" alt="skeleton hero copy" /></figure></div></section>
      <section class="component"><h2>Media Carousel</h2><div class="pair"><figure><figcaption>Source</figcaption><img src="pdp/source-media-carousel.png" alt="source media carousel" /></figure><figure><figcaption>Skeleton</figcaption><img src="pdp/skeleton-media-carousel.png" alt="skeleton media carousel" /></figure></div></section>
      <section class="component"><h2>Hero CTA</h2><div class="pair"><figure><figcaption>Source</figcaption><img src="pdp/source-hero-cta.png" alt="source hero cta" /></figure><figure><figcaption>Skeleton</figcaption><img src="pdp/skeleton-hero-cta.png" alt="skeleton hero cta" /></figure></div></section>
      <section class="component"><h2>Attribute Summary</h2><div class="pair"><figure><figcaption>Source</figcaption><img src="pdp/source-attribute-summary.png" alt="source attribute summary" /></figure><figure><figcaption>Skeleton</figcaption><img src="pdp/skeleton-attribute-summary.png" alt="skeleton attribute summary" /></figure></div></section>
      <section class="component"><h2>Treatment Banner</h2><div class="pair"><figure><figcaption>Source</figcaption><img src="pdp/source-treatment-banner.png" alt="source treatment banner" /></figure><figure><figcaption>Skeleton</figcaption><img src="pdp/skeleton-treatment-banner.png" alt="skeleton treatment banner" /></figure></div></section>
      <section class="component"><h2>Subscription Card</h2><div class="pair"><figure><figcaption>Source</figcaption><img src="pdp/source-subscription-card.png" alt="source subscription card" /></figure><figure><figcaption>Skeleton</figcaption><img src="pdp/skeleton-subscription-card.png" alt="skeleton subscription card" /></figure></div></section>
      <section class="component"><h2>One-time + Add Bag</h2><div class="pair"><figure><figcaption>Source</figcaption><img src="pdp/source-one-time-add.png" alt="source one-time add" /></figure><figure><figcaption>Skeleton</figcaption><img src="pdp/skeleton-one-time-add.png" alt="skeleton one-time add" /></figure></div></section>
      <section class="component"><h2>Benefits Icon Row</h2><div class="pair"><figure><figcaption>Source</figcaption><img src="pdp/source-benefits-icons.png" alt="source benefits icons" /></figure><figure><figcaption>Skeleton</figcaption><img src="pdp/skeleton-benefits-icons.png" alt="skeleton benefits icons" /></figure></div></section>
      <section class="component"><h2>Expanded Accordion</h2><div class="pair"><figure><figcaption>Source</figcaption><img src="pdp/source-accordion-expanded.png" alt="source expanded accordion" /></figure><figure><figcaption>Skeleton</figcaption><img src="pdp/skeleton-accordion-expanded.png" alt="skeleton expanded accordion" /></figure></div></section>
      <section class="component"><h2>Accordion Stack</h2><div class="pair"><figure><figcaption>Source</figcaption><img src="pdp/source-accordion-stack.png" alt="source accordion stack" /></figure><figure><figcaption>Skeleton</figcaption><img src="pdp/skeleton-accordion-stack.png" alt="skeleton accordion stack" /></figure></div></section>
    </main>
  </body>
</html>
